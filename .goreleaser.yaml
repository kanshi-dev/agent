version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: kanshi-agent
    main: ./cmd/agent/main.go
    binary: kanshi-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - # this name template makes the archives look like `kanshi-agent_1.0.0_linux_amd64.tar.gz`
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
